# Test database properties
spring.datasource.url=jdbc:postgresql://localhost:5432/testing_db
spring.datasource.username=test_user
spring.datasource.password=test_password
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Hibernate owns schema creation in tests (create-drop). Liquibase is therefore disabled as it would otherwise try to
# run against testing_db on every context load.
spring.liquibase.enabled=false
logging.level.org.springframework.jdbc.core.JdbcTemplate=TRACE
app.admin.username=test_admin
app.admin.password=test_admin_password